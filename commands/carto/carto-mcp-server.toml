description = "Routes inline/exploratory CARTO map visualization and execution of saved CARTO Workflows that the MCP server exposes as analytical tools (dynamic per account — may or may not be present). Triggers on 'show me X on a map', 'visualize Y', 'make a heatmap of Z', references to saved Builder maps by name, post-CLI-creation inline preview, and analytical asks like 'compute trade areas', 'find hotspots', 'enrich with demographics' when a matching Workflow tool is available. Detects whether the MCP server is attached, whether the host supports MCP Apps (interactive widgets), and whether the CLI is installed; routes accordingly and tells the user what's missing. Distinct from carto-create-builder-maps (CLI authoring of permanent maps) (carto-skills)"

