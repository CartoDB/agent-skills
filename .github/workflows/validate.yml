name: validate

on:
  pull_request:
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python dependencies
        run: pip install pyyaml sqlglot
      - name: Install TypeScript (for snippet validation)
        run: npm install -g typescript@5
      - name: Validate skills catalog and manifests
        run: make validate-skills
      - name: Validate code snippets
        run: make validate-snippets
      - name: Upload snippet errors (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snippet-errors
          path: snippet-errors.json
          if-no-files-found: ignore
